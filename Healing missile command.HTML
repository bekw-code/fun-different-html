<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Luminous Cascade Missile Command</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:radial-gradient(circle at 30% 20%,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#fff;user-select:none;overflow:auto;position:relative;touch-action:manipulation}body::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(45deg,transparent 40%,rgba(64,224,208,.05) 45%,transparent 50%,rgba(147,112,219,.05) 55%,transparent 60%);animation:aurora 15s ease-in-out infinite;pointer-events:none}@keyframes aurora{0%,100%{opacity:.3;transform:translateX(-20%)}50%{opacity:.7;transform:translateX(20%)}}.game-container{width:100vw;min-height:100vh;position:relative;overflow:visible}.hud{position:absolute;top:0;left:0;right:0;padding:10px;background:linear-gradient(180deg,rgba(0,0,0,.3),transparent);backdrop-filter:blur(10px);z-index:100}.hud-content{display:flex;justify-content:space-between;align-items:center;font-size:14px}.score{font-weight:700;text-shadow:0 0 10px rgba(255,255,255,.5)}.wave{color:#40e0d0}.frequency-display{background:linear-gradient(45deg,#ff6b6b,#4ecdc4,#45b7d1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:freqGlow 2s ease-in-out infinite alternate}@keyframes freqGlow{0%{filter:brightness(1)}100%{filter:brightness(1.4)}}.canvas-container{position:absolute;top:0;left:0;width:100%;height:70vh}canvas{display:block;background:transparent}.crystal-city{position:absolute;top:calc(70vh - 80px);width:50px;height:50px;display:flex;align-items:center;justify-content:center;overflow:visible;z-index:10}.city0{left:8%}.city1{left:24%}.city2{left:40%}.city3{left:56%}.city4{left:72%}.city5{left:88%}.city-health{position:absolute;top:-25px;left:50%;transform:translateX(-50%);width:40px;height:4px;background:rgba(0,0,0,.5);border-radius:2px;overflow:hidden}.health-bar{height:100%;background:linear-gradient(90deg,#ff0000,#ffff00,#00ff00);transition:width .3s ease;border-radius:2px}.merkaba{width:40px;height:40px;position:relative;animation:merkabaSpin 8s linear infinite}.merkaba::before,.merkaba::after{content:'';position:absolute;width:100%;height:100%;border:2px solid;border-radius:0}.merkaba::before{background:linear-gradient(45deg,#ff0000,transparent,#ff0000);border-color:#ff0000;transform:rotate(45deg);animation:crystalPulse 3s ease-in-out infinite alternate}.merkaba::after{background:linear-gradient(-45deg,#ff0000,transparent,#ff0000);border-color:#ff0000;transform:rotate(-45deg);animation:crystalPulse 3s ease-in-out infinite alternate reverse}@keyframes merkabaSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes crystalPulse{0%{box-shadow:0 0 15px currentColor;opacity:.6}100%{box-shadow:0 0 30px currentColor,0 0 45px currentColor;opacity:1}}.flower-of-life{width:40px;height:40px;position:relative;animation:flowerSpin 12s linear infinite}.flower-of-life::before,.flower-of-life::after{content:'';position:absolute;width:18px;height:18px;border:2px solid #ff8c00;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}.flower-of-life::before{animation:orangePulse 2.5s ease-in-out infinite alternate}.flower-of-life::after{transform:translate(-50%,-50%) rotate(60deg) translateY(-10px);animation:orangePulse 2.5s ease-in-out infinite alternate reverse}@keyframes flowerSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes orangePulse{0%{box-shadow:0 0 10px #ff8c00;opacity:.7}100%{box-shadow:0 0 20px #ff8c00,0 0 30px #ff8c00;opacity:1}}.sri-yantra{width:40px;height:40px;position:relative;animation:yantraSpin 10s linear infinite}.sri-yantra::before,.sri-yantra::after{content:'';position:absolute;width:30px;height:30px;border:2px solid #ffff00;top:50%;left:50%;transform:translate(-50%,-50%)}.sri-yantra::before{clip-path:polygon(50% 0%,0% 100%,100% 100%);animation:yellowPulse 2.8s ease-in-out infinite alternate}.sri-yantra::after{clip-path:polygon(0% 0%,100% 0%,50% 100%);transform:translate(-50%,-50%) rotate(180deg);animation:yellowPulse 2.8s ease-in-out infinite alternate reverse}@keyframes yantraSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes yellowPulse{0%{box-shadow:0 0 10px #ffff00;opacity:.7}100%{box-shadow:0 0 20px #ffff00,0 0 30px #ffff00;opacity:1}}.heart-chakra{width:40px;height:40px;position:relative;animation:heartSpin 6s linear infinite}.heart-chakra::before{content:'♥';position:absolute;font-size:22px;color:#00ff00;top:50%;left:50%;transform:translate(-50%,-50%);text-shadow:0 0 15px currentColor;animation:greenPulse 2.2s ease-in-out infinite alternate}@keyframes heartSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes greenPulse{0%{text-shadow:0 0 10px currentColor;opacity:.7}100%{text-shadow:0 0 20px currentColor,0 0 30px currentColor;opacity:1}}.throat-mandala{width:40px;height:40px;position:relative;animation:mandalaSpins 14s linear infinite}.throat-mandala::before{content:'';position:absolute;width:35px;height:35px;border:3px solid #0080ff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:bluePulse 2.6s ease-in-out infinite alternate}.throat-mandala::after{content:'';position:absolute;width:20px;height:20px;border:2px solid #0080ff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:bluePulse 2.6s ease-in-out infinite alternate reverse}@keyframes mandalaSpins{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes bluePulse{0%{box-shadow:0 0 10px #0080ff;opacity:.6}100%{box-shadow:0 0 20px #0080ff,0 0 30px #0080ff;opacity:1}}.third-eye{width:40px;height:40px;position:relative;animation:eyeSpin 9s linear infinite}.third-eye::before{content:'👁️';position:absolute;font-size:24px;top:50%;left:50%;transform:translate(-50%,-50%);filter:hue-rotate(240deg) saturate(2);animation:indigoPulse 3.1s ease-in-out infinite alternate;text-shadow:0 0 15px #4b0082}@keyframes eyeSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}@keyframes indigoPulse{0%{text-shadow:0 0 10px #4b0082;opacity:.7}100%{text-shadow:0 0 20px #4b0082,0 0 35px #4b0082;opacity:1}}.controls{position:absolute;top:calc(70vh + 10px);left:50%;transform:translateX(-50%);display:flex;gap:15px;z-index:100;background:rgba(0,0,0,.3);padding:15px;border-radius:15px;backdrop-filter:blur(10px)}.control-btn{background:linear-gradient(45deg,rgba(255,255,255,.1),rgba(255,255,255,.05));border:2px solid rgba(255,255,255,.3);border-radius:15px;color:#fff;font-size:14px;font-weight:700;padding:12px 20px;cursor:pointer;transition:all .3s ease;backdrop-filter:blur(10px);box-shadow:0 8px 20px rgba(0,0,0,.3);touch-action:manipulation}.control-btn:hover,.control-btn:active{background:linear-gradient(45deg,rgba(255,255,255,.2),rgba(255,255,255,.1));transform:translateY(-2px);box-shadow:0 12px 30px rgba(0,0,0,.4)}.start-btn{background:linear-gradient(45deg,#00ff88,#00cc6a);animation:startGlow 2s ease-in-out infinite alternate}@keyframes startGlow{0%{box-shadow:0 8px 20px rgba(0,0,0,.3)}100%{box-shadow:0 8px 20px rgba(0,255,136,.4),0 0 30px rgba(0,255,136,.3)}}.city-destroyed{opacity:.3;animation:none!important}.city-destroyed *{animation:none!important;opacity:.3}</style></head><body><div class="game-container"><div class="hud"><div class="hud-content"><div class="score">Score: <span id="score">0</span></div><div class="wave">Wave: <span id="wave">1</span></div><div class="frequency-display" id="freq-display">🌈 Ready ✨</div></div></div><div class="canvas-container"><canvas id="gameCanvas"></canvas></div><div class="crystal-city city0"><div class="city-health"><div class="health-bar" style="width:100%"></div></div><div class="merkaba"></div></div><div class="crystal-city city1"><div class="city-health"><div class="health-bar" style="width:100%"></div></div><div class="flower-of-life"></div></div><div class="crystal-city city2"><div class="city-health"><div class="health-bar" style="width:100%"></div></div><div class="sri-yantra"></div></div><div class="crystal-city city3"><div class="city-health"><div class="health-bar" style="width:100%"></div></div><div class="heart-chakra"></div></div><div class="crystal-city city4"><div class="city-health"><div class="health-bar" style="width:100%"></div></div><div class="throat-mandala"></div></div><div class="crystal-city city5"><div class="city-health"><div class="health-bar" style="width:100%"></div></div><div class="third-eye"></div></div><div class="controls"><button class="control-btn start-btn" id="start-btn">🚀 START</button><button class="control-btn" id="pause-btn">⏸️</button></div></div><script>const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');const lightFreqs={red:130,orange:150,yellow:170,green:190,blue:210,indigo:230,violet:250};const spectrumColors=['#ff0000','#ff8c00','#ffff00','#00ff00','#0080ff','#4b0082','#8b00ff'];const enemyColors=['#ff4444','#ff6666','#ff8888','#ffaaaa'];let audioCtx;let gameState;function initGameState(){gameState={running:false,score:0,wave:1,waveProgress:0,enemiesThisWave:5,enemiesSpawned:0,cities:[{x:0,y:0,alive:true,health:100,maxHealth:100,color:'red',type:'merkaba'},{x:0,y:0,alive:true,health:100,maxHealth:100,color:'orange',type:'flower'},{x:0,y:0,alive:true,health:100,maxHealth:100,color:'yellow',type:'yantra'},{x:0,y:0,alive:true,health:100,maxHealth:100,color:'green',type:'heart'},{x:0,y:0,alive:true,health:100,maxHealth:100,color:'blue',type:'mandala'},{x:0,y:0,alive:true,health:100,maxHealth:100,color:'indigo',type:'eye'}],missiles:[],playerMissiles:[],explosions:[],particles:[]}}function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight*.7;if(gameState&&gameState.cities){gameState.cities.forEach((city,i)=>{city.x=canvas.width*(.08+i*.16);city.y=canvas.height-60})}}function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}function playDeepGong(baseFreq,volume=.4){if(!audioCtx)return;const harmonics=[1,1.2,1.5,2,2.5];harmonics.forEach((harmonic,i)=>{setTimeout(()=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();const filter=audioCtx.createBiquadFilter();osc.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=baseFreq*harmonic;osc.type='sine';filter.type='lowpass';filter.frequency.value=baseFreq*3;filter.Q.value=20;const vol=volume/(i+1);gain.gain.setValueAtTime(0,audioCtx.currentTime);gain.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+.1);gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+3);osc.start(audioCtx.currentTime);osc.stop(audioCtx.currentTime+3)},i*80)})}function playDiscordantThreat(){if(!audioCtx)return;const freqs=[80,87,94];freqs.forEach((freq,i)=>{setTimeout(()=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=freq;osc.type='sawtooth';gain.gain.setValueAtTime(0,audioCtx.currentTime);gain.gain.linearRampToValueAtTime(.2,audioCtx.currentTime+.01);gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+1);osc.start(audioCtx.currentTime);osc.stop(audioCtx.currentTime+1)},i*120)})}function spawnEnemyMissile(){if(!gameState.running||gameState.enemiesSpawned>=gameState.enemiesThisWave)return;const aliveCities=gameState.cities.filter(city=>city.alive);if(aliveCities.length===0)return;const targetCity=aliveCities[Math.floor(Math.random()*aliveCities.length)];const startX=Math.random()*canvas.width;const baseSpeed=.4+gameState.wave*.08;const colorIndex=Math.floor(Math.random()*enemyColors.length);gameState.missiles.push({x:startX,y:0,targetX:targetCity.x,targetY:targetCity.y,speed:baseSpeed,trail:[],color:enemyColors[colorIndex]});gameState.enemiesSpawned++;playDiscordantThreat()}function createPlayerMissile(targetX,targetY){if(!gameState.running)return;const startX=canvas.width/2;const startY=canvas.height-20;const dx=targetX-startX;const dy=targetY-startY;const dist=Math.sqrt(dx*dx+dy*dy);const speed=6;const colorIndex=Math.floor(Math.random()*spectrumColors.length);gameState.playerMissiles.push({x:startX,y:startY,vx:(dx/dist)*speed,vy:(dy/dist)*speed,targetX:targetX,targetY:targetY,color:spectrumColors[colorIndex],trail:[],freq:Object.values(lightFreqs)[colorIndex]})}function createExplosion(x,y,color,isPlayer=false){const explosion={x:x,y:y,radius:5,maxRadius:isPlayer?100:50,color:color,life:1,particles:[]};for(let i=0;i<(isPlayer?35:12);i++){explosion.particles.push({x:x,y:y,vx:(Math.random()-.5)*7,vy:(Math.random()-.5)*7,life:1,color:isPlayer?spectrumColors[Math.floor(Math.random()*spectrumColors.length)]:color})}gameState.explosions.push(explosion);if(isPlayer){playDeepGong(lightFreqs.green,.5)}}function updateCityHealth(cityIndex,damage){if(gameState.cities[cityIndex].alive){gameState.cities[cityIndex].health=Math.max(0,gameState.cities[cityIndex].health-damage);if(gameState.cities[cityIndex].health<=0){gameState.cities[cityIndex].alive=false;document.querySelector(`.city${cityIndex}`).classList.add('city-destroyed')}const healthPercent=(gameState.cities[cityIndex].health/gameState.cities[cityIndex].maxHealth)*100;document.querySelector(`.city${cityIndex} .health-bar`).style.width=healthPercent+'%'}}function updateMissiles(){gameState.missiles.forEach((missile,i)=>{missile.trail.push({x:missile.x,y:missile.y});if(missile.trail.length>8)missile.trail.shift();const dx=missile.targetX-missile.x;const dy=missile.targetY-missile.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<5){createExplosion(missile.x,missile.y,missile.color);checkCityHit(missile.x,missile.y);gameState.missiles.splice(i,1);playDiscordantThreat()}else{missile.x+=dx/dist*missile.speed;missile.y+=dy/dist*missile.speed}});gameState.playerMissiles.forEach((missile,i)=>{missile.trail.push({x:missile.x,y:missile.y});if(missile.trail.length>6)missile.trail.shift();missile.x+=missile.vx;missile.y+=missile.vy;const dist=Math.sqrt((missile.targetX-missile.x)**2+(missile.targetY-missile.y)**2);if(dist<20){createExplosion(missile.x,missile.y,missile.color,true);checkMissileHit(missile.x,missile.y);gameState.playerMissiles.splice(i,1);playDeepGong(missile.freq,.4)}if(missile.x<0||missile.x>canvas.width||missile.y<0||missile.y>canvas.height){gameState.playerMissiles.splice(i,1)}})}function checkCityHit(x,y){gameState.cities.forEach((city,i)=>{const dist=Math.sqrt((city.x-x)**2+(city.y-y)**2);if(dist<40&&city.alive){updateCityHealth(i,34);playDiscordantThreat()}})}function checkMissileHit(x,y){gameState.missiles.forEach((missile,i)=>{const dist=Math.sqrt((missile.x-x)**2+(missile.y-y)**2);if(dist<80){gameState.score+=100;gameState.missiles.splice(i,1)}})}function updateExplosions(){gameState.explosions.forEach((explosion,i)=>{explosion.radius=Math.min(explosion.radius+1.2,explosion.maxRadius);explosion.life-=.012;explosion.particles.forEach(particle=>{particle.x+=particle.vx;particle.y+=particle.vy;particle.vx*=.97;particle.vy*=.97;particle.life-=.018});explosion.particles=explosion.particles.filter(p=>p.life>0);if(explosion.life<=0){gameState.explosions.splice(i,1)}})}function checkWaveComplete(){if(gameState.enemiesSpawned>=gameState.enemiesThisWave&&gameState.missiles.length===0){gameState.wave++;gameState.enemiesThisWave=Math.min(5+gameState.wave*2,18);gameState.enemiesSpawned=0;document.getElementById('freq-display').textContent=`🌈 Wave ${gameState.wave}! ✨`;playDeepGong(lightFreqs.green,.6);setTimeout(()=>{document.getElementById('freq-display').textContent='🌈 Ready ✨'},2000)}}function drawStars(){ctx.fillStyle='rgba(255,255,255,0.6)';for(let i=0;i<20;i++){const x=Math.random()*canvas.width;const y=Math.random()*canvas.height*.4;const size=Math.random()*1.5;ctx.fillRect(x,y,size,size)}}function drawMissiles(){gameState.missiles.forEach(missile=>{ctx.strokeStyle=missile.color;ctx.lineWidth=3;ctx.beginPath();missile.trail.forEach((point,i)=>{if(i===0)ctx.moveTo(point.x,point.y);else ctx.lineTo(point.x,point.y)});ctx.stroke();ctx.fillStyle=missile.color;ctx.beginPath();ctx.arc(missile.x,missile.y,4,0,Math.PI*2);ctx.fill()});gameState.playerMissiles.forEach(missile=>{const gradient=ctx.createLinearGradient(missile.x-15,missile.y,missile.x+15,missile.y);gradient.addColorStop(0,'transparent');gradient.addColorStop(.5,missile.color);gradient.addColorStop(1,'transparent');ctx.strokeStyle=gradient;ctx.lineWidth=4;ctx.beginPath();missile.trail.forEach((point,i)=>{if(i===0)ctx.moveTo(point.x,point.y);else ctx.lineTo(point.x,point.y)});ctx.stroke();ctx.shadowColor=missile.color;ctx.shadowBlur=15;ctx.fillStyle=missile.color;ctx.beginPath();ctx.arc(missile.x,missile.y,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0})}function drawExplosions(){gameState.explosions.forEach(explosion=>{const gradient=ctx.createRadialGradient(explosion.x,explosion.y,0,explosion.x,explosion.y,explosion.radius);gradient.addColorStop(0,explosion.color+'aa');gradient.addColorStop(.6,explosion.color+'44');gradient.addColorStop(1,'transparent');ctx.fillStyle=gradient;ctx.beginPath();ctx.arc(explosion.x,explosion.y,explosion.radius,0,Math.PI*2);ctx.fill();explosion.particles.forEach(particle=>{ctx.fillStyle=particle.color+(Math.floor(particle.life*255).toString(16).padStart(2,'0'));ctx.beginPath();ctx.arc(particle.x,particle.y,3*particle.life,0,Math.PI*2);ctx.fill()})})}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);drawStars();drawMissiles();drawExplosions()}function gameLoop(){if(!gameState.running)return;updateMissiles();updateExplosions();checkWaveComplete();draw();const spawnRate=.004+gameState.wave*.0015;if(Math.random()<spawnRate){spawnEnemyMissile()}if(gameState.cities.every(city=>!city.alive)){endGame()}document.getElementById('score').textContent=gameState.score;document.getElementById('wave').textContent=gameState.wave}function startGame(){initAudio();gameState.running=true;gameState.score=0;gameState.wave=1;gameState.enemiesThisWave=5;gameState.enemiesSpawned=0;gameState.cities.forEach((city,i)=>{city.alive=true;city.health=100;updateCityHealth(i,0);document.querySelector(`.city${i}`).classList.remove('city-destroyed')});gameState.missiles=[];gameState.playerMissiles=[];gameState.explosions=[];document.getElementById('start-btn').textContent='🔄 RESTART';setInterval(gameLoop,16);playDeepGong(lightFreqs.green,.5)}function pauseGame(){gameState.running=!gameState.running;document.getElementById('pause-btn').textContent=gameState.running?'⏸️':'▶️'}function endGame(){gameState.running=false;alert('🌟 Defense Complete! Score: '+gameState.score+' ✨');document.getElementById('start-btn').textContent='🚀 START'}function setupBreathing(){let breathing=false;setInterval(()=>{const indicator=document.getElementById('breath-indicator');breathing=!breathing;indicator.style.transform=breathing?'scale(1)':'scale(.3)'},4000)}canvas.addEventListener('click',e=>{const rect=canvas.getBoundingClientRect();const x=e.clientX-rect.left;const y=e.clientY-rect.top;createPlayerMissile(x,y)});canvas.addEventListener('touchstart',e=>{e.preventDefault();const rect=canvas.getBoundingClientRect();const touch=e.touches[0];const x=touch.clientX-rect.left;const y=touch.clientY-rect.top;createPlayerMissile(x,y)});document.getElementById('start-btn').onclick=startGame;document.getElementById('pause-btn').onclick=pauseGame;window.addEventListener('resize',resizeCanvas);initGameState();resizeCanvas();draw()</script></body></html>
