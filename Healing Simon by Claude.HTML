<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDIA - Healing Memory Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at center, #1a1a2e, #16213e, #0f1419);
            color: #fff; 
            font-family: 'Arial', sans-serif; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #f093fb, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }
        
        .game-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 20px 0;
        }
        
        .chakra-button {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .chakra-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .chakra-button.active {
            animation: pulse 0.6s ease-in-out;
            transform: scale(1.2);
        }
        
        .chakra-button.wither {
            animation: wither 1s ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
            50% { transform: scale(1.3); box-shadow: 0 0 40px currentColor; }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        }
        
        @keyframes wither {
            0% { transform: scale(1) rotate(0deg); opacity: 1; }
            25% { transform: scale(0.8) rotate(-5deg); opacity: 0.7; }
            50% { transform: scale(0.6) rotate(5deg); opacity: 0.4; }
            75% { transform: scale(0.4) rotate(-3deg); opacity: 0.2; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        /* Seven-pointed star positions */
        .root { top: 270px; left: 135px; background: linear-gradient(135deg, #ff4757, #c44569); }
        .sacral { top: 200px; left: 50px; background: linear-gradient(135deg, #ff7675, #fd79a8); }
        .solar { top: 80px; left: 80px; background: linear-gradient(135deg, #fdcb6e, #f39c12); }
        .heart { top: 20px; left: 135px; background: linear-gradient(135deg, #00b894, #55a3ff); }
        .throat { top: 80px; left: 190px; background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .third-eye { top: 200px; left: 220px; background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        .crown { top: 135px; left: 135px; background: linear-gradient(135deg, #fd79a8, #fdcb6e); }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .score {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .message {
            font-size: 16px;
            margin-top: 10px;
            height: 20px;
            opacity: 0.8;
        }
        
        @media (max-width: 480px) {
            .title { font-size: 24px; }
            .game-container { width: 280px; height: 280px; }
            .chakra-button { width: 60px; height: 60px; font-size: 10px; }
            .root { top: 220px; left: 110px; }
            .sacral { top: 160px; left: 40px; }
            .solar { top: 60px; left: 65px; }
            .heart { top: 15px; left: 110px; }
            .throat { top: 60px; left: 155px; }
            .third-eye { top: 160px; left: 180px; }
            .crown { top: 110px; left: 110px; }
        }
    </style>
</head>
<body>
    <div class="title">✨ CLAUDIA ✨</div>
    
    <div class="game-container">
        <div class="chakra-button root" data-chakra="0">ROOT<br>194Hz</div>
        <div class="chakra-button sacral" data-chakra="1">SACRAL<br>210Hz</div>
        <div class="chakra-button solar" data-chakra="2">SOLAR<br>126Hz</div>
        <div class="chakra-button heart" data-chakra="3">HEART<br>341Hz</div>
        <div class="chakra-button throat" data-chakra="4">THROAT<br>384Hz</div>
        <div class="chakra-button third-eye" data-chakra="5">3RD EYE<br>288Hz</div>
        <div class="chakra-button crown" data-chakra="6">CROWN<br>216Hz</div>
    </div>
    
    <div class="controls">
        <button class="btn" id="startBtn">Start Game</button>
        <button class="btn" id="resetBtn">Reset</button>
    </div>
    
    <div class="score">Level: <span id="level">0</span></div>
    <div class="message" id="message">Press Start to begin your healing journey</div>

    <script>
        class ClaudiaGame {
            constructor() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.audioContext.createGain();
                this.masterGain.gain.value = 2.0;
                this.masterGain.connect(this.audioContext.destination);
                
                this.chakraFreqs = [194.18, 210.42, 126.22, 341.3, 384, 288, 216];
                this.sequence = [];
                this.playerSequence = [];
                this.level = 0;
                this.isPlaying = false;
                this.isPlayerTurn = false;
                
                this.buttons = document.querySelectorAll('.chakra-button');
                this.startBtn = document.getElementById('startBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.levelDisplay = document.getElementById('level');
                this.messageDisplay = document.getElementById('message');
                
                this.bindEvents();
            }
            
            bindEvents() {
                this.startBtn.onclick = () => this.startGame();
                this.resetBtn.onclick = () => this.resetGame();
                
                this.buttons.forEach((btn, index) => {
                    btn.onclick = () => this.handlePlayerInput(index);
                });
            }
            
            createHealingTone(freq, duration = 1.2) {
                // Create pipe organ-like harmonic medley
                const harmonics = [1, 0.5, 0.33, 0.25, 0.2]; // Fundamental + overtones
                const volumes = [0.4, 0.25, 0.15, 0.1, 0.08]; // Volume for each harmonic
                
                harmonics.forEach((harmonic, index) => {
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    const filter = this.audioContext.createBiquadFilter();
                    
                    osc.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.masterGain);
                    
                    // Set frequency for this harmonic
                    osc.frequency.setValueAtTime(freq * harmonic, this.audioContext.currentTime);
                    osc.type = 'sine';
                    
                    // Pipe organ-like filtering
                    filter.type = 'lowpass';
                    filter.frequency.value = freq * harmonic * 3;
                    filter.Q.value = 0.8;
                    
                    // Graceful envelope with longer sustain
                    const vol = volumes[index];
                    gain.gain.setValueAtTime(0, this.audioContext.currentTime);
                    gain.gain.linearRampToValueAtTime(vol, this.audioContext.currentTime + 0.15);
                    gain.gain.linearRampToValueAtTime(vol * 0.8, this.audioContext.currentTime + 0.6);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
                    
                    osc.start();
                    osc.stop(this.audioContext.currentTime + duration);
                });
            }
            
            async startGame() {
                if (this.audioContext.state === 'suspended') {
                    await this.audioContext.resume();
                }
                
                this.isPlaying = true;
                this.startBtn.disabled = true;
                this.addToSequence();
                this.playSequence();
            }
            
            resetGame() {
                this.sequence = [];
                this.playerSequence = [];
                this.level = 0;
                this.isPlaying = false;
                this.isPlayerTurn = false;
                this.startBtn.disabled = false;
                this.updateDisplay();
                this.setMessage("Press Start to begin your healing journey");
                
                this.buttons.forEach(btn => {
                    btn.classList.remove('active', 'wither');
                });
            }
            
            addToSequence() {
                const randomChakra = Math.floor(Math.random() * 7);
                this.sequence.push(randomChakra);
                this.level++;
                this.updateDisplay();
            }
            
            async playSequence() {
                this.isPlayerTurn = false;
                this.setMessage("Watch and listen...");
                
                for (let i = 0; i < this.sequence.length; i++) {
                    await this.wait(600);
                    await this.activateButton(this.sequence[i]);
                }
                
                this.isPlayerTurn = true;
                this.playerSequence = [];
                this.setMessage("Your turn! Repeat the sequence");
            }
            
            async activateButton(chakraIndex) {
                const button = this.buttons[chakraIndex];
                button.classList.add('active');
                this.createHealingTone(this.chakraFreqs[chakraIndex]);
                
                await this.wait(600);
                button.classList.remove('active');
            }
            
            async handlePlayerInput(chakraIndex) {
                if (!this.isPlayerTurn || !this.isPlaying) return;
                
                this.createHealingTone(this.chakraFreqs[chakraIndex], 0.6);
                this.buttons[chakraIndex].classList.add('active');
                
                setTimeout(() => {
                    this.buttons[chakraIndex].classList.remove('active');
                }, 200);
                
                this.playerSequence.push(chakraIndex);
                
                // Check if correct
                const currentIndex = this.playerSequence.length - 1;
                if (this.playerSequence[currentIndex] !== this.sequence[currentIndex]) {
                    await this.gameOver();
                    return;
                }
                
                // Check if sequence complete
                if (this.playerSequence.length === this.sequence.length) {
                    this.isPlayerTurn = false;
                    this.setMessage("Beautiful! Preparing next level...");
                    
                    setTimeout(() => {
                        this.addToSequence();
                        this.playSequence();
                    }, 1500);
                }
            }
            
            async gameOver() {
                this.isPlaying = false;
                this.isPlayerTurn = false;
                
                // Wither effect on all buttons
                this.buttons.forEach(btn => {
                    btn.classList.add('wither');
                });
                
                this.setMessage(`Game Over! You reached level ${this.level}`);
                
                setTimeout(() => {
                    this.resetGame();
                }, 2000);
            }
            
            updateDisplay() {
                this.levelDisplay.textContent = this.level;
            }
            
            setMessage(text) {
                this.messageDisplay.textContent = text;
            }
            
            wait(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }
        
        window.addEventListener('load', () => new ClaudiaGame());
    </script>
</body>
</html>
