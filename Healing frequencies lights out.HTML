<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Healing Frequency Lights Out</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:radial-gradient(circle at 30% 20%,#1a1a2e,#16213e,#0f3460);color:#fff;user-select:none;padding:10px;min-height:100vh}body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(45deg,transparent 40%,rgba(64,224,208,.05) 45%,transparent 50%,rgba(147,112,219,.05) 55%,transparent 60%);animation:aurora 15s ease-in-out infinite;pointer-events:none}@keyframes aurora{0%,100%{opacity:.3;transform:translateX(-20%)}50%{opacity:.7;transform:translateX(20%)}}.container{max-width:400px;margin:0 auto;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:2px solid rgba(255,255,255,.3);border-radius:20px;padding:20px;text-align:center}.title{font-size:20px;margin-bottom:15px;background:linear-gradient(45deg,#ff6b6b,#4ecdc4,#45b7d1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.info{margin-bottom:20px;font-size:14px;opacity:.8}.grid{display:grid;grid-template-columns:repeat(5,50px);grid-template-rows:repeat(5,50px);gap:8px;justify-content:center;margin:20px 0}.node{width:50px;height:50px;border-radius:10px;cursor:pointer;transition:all .3s ease;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.4)}.node.on.red{background:radial-gradient(circle,#ff4444,#cc0000);box-shadow:0 0 20px #ff4444;animation:pulseRed 2s ease-in-out infinite alternate}.node.on.orange{background:radial-gradient(circle,#ff8844,#cc4400);box-shadow:0 0 20px #ff8844;animation:pulseOrange 2.2s ease-in-out infinite alternate}.node.on.yellow{background:radial-gradient(circle,#ffff44,#cccc00);box-shadow:0 0 20px #ffff44;animation:pulseYellow 2.4s ease-in-out infinite alternate}.node.on.green{background:radial-gradient(circle,#44ff44,#00cc00);box-shadow:0 0 20px #44ff44;animation:pulseGreen 2.6s ease-in-out infinite alternate}.node.on.blue{background:radial-gradient(circle,#4488ff,#0066cc);box-shadow:0 0 20px #4488ff;animation:pulseBlue 2.8s ease-in-out infinite alternate}.node.on.indigo{background:radial-gradient(circle,#8844ff,#6600cc);box-shadow:0 0 20px #8844ff;animation:pulseIndigo 3s ease-in-out infinite alternate}.node.on.violet{background:radial-gradient(circle,#cc44ff,#9900cc);box-shadow:0 0 20px #cc44ff;animation:pulseViolet 3.2s ease-in-out infinite alternate}@keyframes pulseRed{0%{box-shadow:0 0 15px #ff4444}100%{box-shadow:0 0 30px #ff4444}}@keyframes pulseOrange{0%{box-shadow:0 0 15px #ff8844}100%{box-shadow:0 0 30px #ff8844}}@keyframes pulseYellow{0%{box-shadow:0 0 15px #ffff44}100%{box-shadow:0 0 30px #ffff44}}@keyframes pulseGreen{0%{box-shadow:0 0 15px #44ff44}100%{box-shadow:0 0 30px #44ff44}}@keyframes pulseBlue{0%{box-shadow:0 0 15px #4488ff}100%{box-shadow:0 0 30px #4488ff}}@keyframes pulseIndigo{0%{box-shadow:0 0 15px #8844ff}100%{box-shadow:0 0 30px #8844ff}}@keyframes pulseViolet{0%{box-shadow:0 0 15px #cc44ff}100%{box-shadow:0 0 30px #cc44ff}}.controls{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:white;padding:12px 20px;border-radius:10px;cursor:pointer;backdrop-filter:blur(10px);transition:all .3s ease;font-size:14px}.btn:hover,.btn:active{background:rgba(255,255,255,.2);transform:translateY(-2px)}.start-btn{background:linear-gradient(45deg,#00ff88,#00cc6a);border-color:#00ff88}.status{margin-top:15px;font-size:16px}.moves{margin-top:10px;font-size:14px;opacity:.7}</style></head><body><div class="container"><div class="title">Healing Frequency Lights Out</div><div class="info">Turn off all the lights! Each click toggles a light and its neighbors.</div><div class="grid" id="grid"></div><div class="status" id="status">Click New Game to start</div><div class="moves">Moves: <span id="moves">0</span></div><div class="controls"><button class="btn start-btn" onclick="newGame()">New Game</button><button class="btn" onclick="solvable()">Solvable Puzzle</button></div></div><script>const colors=['red','orange','yellow','green','blue','indigo','violet'];const frequencies=[194,210,238,285,341,384,417];let audioCtx;let grid=[];let moves=0;let gameActive=false;function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}function playFrequency(freq){if(!audioCtx)return;const harmonics=[1,1.5,2,2.5];harmonics.forEach((harmonic,i)=>{setTimeout(()=>{const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();const filter=audioCtx.createBiquadFilter();osc.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);osc.frequency.value=freq*harmonic;osc.type='sine';filter.type='lowpass';filter.frequency.value=freq*3;filter.Q.value=10;const vol=.2/(harmonic+.5);gain.gain.setValueAtTime(0,audioCtx.currentTime);gain.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+.1);gain.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.6);osc.start();osc.stop(audioCtx.currentTime+.6)},i*40)});}function initGrid(){const gridEl=document.getElementById('grid');gridEl.innerHTML='';grid=[];for(let row=0;row<5;row++){grid[row]=[];for(let col=0;col<5;col++){grid[row][col]=false;const node=document.createElement('div');const colorIndex=(row*2+col)%colors.length;node.className=`node ${colors[colorIndex]}`;node.dataset.row=row;node.dataset.col=col;node.dataset.freq=frequencies[colorIndex];node.onclick=()=>toggleNode(row,col);gridEl.appendChild(node)}}updateDisplay()}function updateDisplay(){const nodes=document.querySelectorAll('.node');nodes.forEach(node=>{const row=parseInt(node.dataset.row);const col=parseInt(node.dataset.col);if(grid[row][col]){node.classList.add('on')}else{node.classList.remove('on')}})}function toggleNode(row,col){if(!gameActive)return;moves++;document.getElementById('moves').textContent=moves;const positions=[[row,col],[row-1,col],[row+1,col],[row,col-1],[row,col+1]];const playedFreqs=new Set();positions.forEach(([r,c])=>{if(r>=0&&r<5&&c>=0&&c<5){grid[r][c]=!grid[r][c];const node=document.querySelector(`[data-row="${r}"][data-col="${c}"]`);if(grid[r][c]){playedFreqs.add(parseInt(node.dataset.freq))}}});updateDisplay();playedFreqs.forEach(freq=>playFrequency(freq));checkWin()}function checkWin(){const lightsOn=grid.flat().filter(Boolean).length;if(lightsOn===0){gameActive=false;document.getElementById('status').textContent='All lights out! Perfect harmony achieved!';[194,210,238,285,341,384,417].forEach((freq,i)=>setTimeout(()=>playFrequency(freq),i*100));return}document.getElementById('status').textContent=`${lightsOn} lights still on`}function newGame(){initAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();gameActive=true;moves=0;document.getElementById('moves').textContent=moves;grid.forEach(row=>row.fill(false));for(let i=0;i<Math.floor(Math.random()*8)+5;i++){const row=Math.floor(Math.random()*5);const col=Math.floor(Math.random()*5);const positions=[[row,col],[row-1,col],[row+1,col],[row,col-1],[row,col+1]];positions.forEach(([r,c])=>{if(r>=0&&r<5&&c>=0&&c<5){grid[r][c]=!grid[r][c]}});}moves=0;document.getElementById('moves').textContent=moves;updateDisplay();checkWin()}function solvable(){initAudio();if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();gameActive=true;moves=0;document.getElementById('moves').textContent=moves;grid.forEach(row=>row.fill(false));grid[1][1]=true;grid[1][3]=true;grid[3][1]=true;grid[3][3]=true;updateDisplay();checkWin()}initGrid();</script></body></html>
