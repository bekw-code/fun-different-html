<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cyberpunk Connect Four</title>
<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:'Orbitron',sans-serif;
  background:radial-gradient(circle at center,#150021,#000010 70%);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
h1{
  color:#ff00ff;
  text-shadow:0 0 10px #ff00ff,0 0 20px #ff00ff;
  margin:10px;
}
#game{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-template-rows:repeat(6,1fr);
  gap:5px;
  width:min(90vw,450px);
  height:calc(min(90vw,450px)*6/7);
  background:linear-gradient(135deg,#111,#222);
  padding:5px;
  border-radius:16px;
  box-shadow:0 0 20px #0ff4;
  position:relative;
}
.cell{
  border-radius:50%;
  background:radial-gradient(circle,#111 30%,#000 70%);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}
.disc{
  width:90%;
  height:90%;
  border-radius:50%;
  transform:translateY(-120%);
  opacity:0;
  transition:transform 0.4s ease,opacity 0.3s ease;
}
.disc.show{
  transform:translateY(0);
  opacity:1;
}
.player{background:radial-gradient(circle,#ff00ff,#a000a0);}
.ai{background:radial-gradient(circle,#00ffff,#0080a0);}
.win{
  box-shadow:0 0 20px 8px #fff8;
  animation:blink 0.8s infinite alternate;
}
@keyframes blink{
  from{filter:brightness(1);}
  to{filter:brightness(2);}
}
#controls{
  display:flex;
  gap:20px;
  margin-top:10px;
  align-items:center;
}
button{
  background:linear-gradient(90deg,#ff00ff,#00ffff);
  border:none;
  padding:8px 20px;
  color:#fff;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 0 10px #0ff,0 0 20px #f0f;
  transition:transform 0.2s;
}
button:hover{transform:scale(1.05);}
#score{
  font-size:1.1em;
  text-shadow:0 0 5px #0ff;
}
</style>
</head>
<body>
<h1>Cyberpunk Connect Four</h1>
<div id="game"></div>
<div id="controls">
  <div id="score">You 0 : 0 AI</div>
  <button id="reset">Reset</button>
</div>

<script>
const ROWS=6,COLS=7,PLAYER=1,AI=2,DEPTH=5;
let board,playerWins=0,aiWins=0;
const game=document.getElementById('game');
function init(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  game.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.row=r;cell.dataset.col=c;
      cell.onclick=()=>playerMove(c);
      game.appendChild(cell);
    }
  }
}
function getAvailableRow(c){
  for(let r=ROWS-1;r>=0;r--) if(board[r][c]===0) return r;
  return -1;
}
function dropDisc(r,c,who){
  board[r][c]=who;
  const cell=[...game.children].find(e=>e.dataset.row==r&&e.dataset.col==c);
  const d=document.createElement('div');
  d.className='disc '+(who===PLAYER?'player':'ai');
  cell.appendChild(d);
  setTimeout(()=>d.classList.add('show'),50);
}
function checkWin(who){
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]===who)
    for(const [dr,dc]of dirs){
      let k=1;
      while(k<4 && board[r+k*dr]?.[c+k*dc]===who)k++;
      if(k===4){highlight(r,c,dr,dc);return true;}
    }
  return false;
}
function highlight(r,c,dr,dc){
  for(let k=0;k<4;k++){
    const cell=[...game.children].find(e=>e.dataset.row==r+k*dr&&e.dataset.col==c+k*dc);
    cell.classList.add('win');
  }
}
function full(){return board.every(row=>row.every(v=>v!==0));}
function playerMove(c){
  const r=getAvailableRow(c);
  if(r<0)return;
  dropDisc(r,c,PLAYER);
  if(checkWin(PLAYER)){playerWins++;end('You win!');return;}
  if(full()){end('Draw');return;}
  setTimeout(aiMove,200);
}
function aiMove(){
  const [score,col]=minimax(board,DEPTH,-Infinity,Infinity,true);
  const r=getAvailableRow(col);
  if(r>=0){
    dropDisc(r,col,AI);
    if(checkWin(AI)){aiWins++;end('AI wins!');return;}
    if(full()){end('Draw');return;}
  }
}
function cloneBoard(b){return b.map(r=>[...r]);}
function validMoves(b){return [...Array(COLS).keys()].filter(c=>b[0][c]===0);}
function evaluate(b){
  const scoreLine=(arr,who)=>{
    const o=who===PLAYER?AI:PLAYER;
    const c=arr.filter(x=>x===who).length;
    const d=arr.filter(x=>x===o).length;
    if(c===4)return 1000;
    if(c===3&&d===0)return 50;
    if(c===2&&d===0)return 10;
    if(d===3&&c===0)return -40;
    return 0;
  };
  let score=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-3;c++)
    score+=scoreLine([b[r][c],b[r][c+1],b[r][c+2],b[r][c+3]],AI);
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS-3;r++)
    score+=scoreLine([b[r][c],b[r+1][c],b[r+2][c],b[r+3][c]],AI);
  for(let r=0;r<ROWS-3;r++)for(let c=0;c<COLS-3;c++)
    score+=scoreLine([b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3]],AI);
  for(let r=3;r<ROWS;r++)for(let c=0;c<COLS-3;c++)
    score+=scoreLine([b[r][c],b[r-1][c+1],b[r-2][c+2],b[r-3][c+3]],AI);
  return score;
}
function minimax(b,depth,alpha,beta,maximizing){
  const moves=validMoves(b);
  if(depth===0||moves.length===0||checkWin(PLAYER)||checkWin(AI))
    return [evaluate(b),null];
  if(maximizing){
    let best=-Infinity,bestCol=moves[0];
    for(const c of moves){
      const r=getAvailableRowLocal(b,c);
      const nb=cloneBoard(b);
      nb[r][c]=AI;
      if(winLocal(nb,AI))return [9999,c];
      const [v]=minimax(nb,depth-1,alpha,beta,false);
      if(v>best){best=v;bestCol=c;}
      alpha=Math.max(alpha,best);
      if(beta<=alpha)break;
    }
    return [best,bestCol];
  }else{
    let best=Infinity,bestCol=moves[0];
    for(const c of moves){
      const r=getAvailableRowLocal(b,c);
      const nb=cloneBoard(b);
      nb[r][c]=PLAYER;
      if(winLocal(nb,PLAYER))return [-9999,c];
      const [v]=minimax(nb,depth-1,alpha,beta,true);
      if(v<best){best=v;bestCol=c;}
      beta=Math.min(beta,best);
      if(beta<=alpha)break;
    }
    return [best,bestCol];
  }
}
function getAvailableRowLocal(b,c){
  for(let r=ROWS-1;r>=0;r--)if(b[r][c]===0)return r;
  return -1;
}
function winLocal(b,who){
  const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(b[r][c]===who)
    for(const[dr,dc]of dirs){
      let k=1;
      while(k<4&&b[r+k*dr]?.[c+k*dc]===who)k++;
      if(k===4)return true;
    }
  return false;
}
function end(msg){
  setTimeout(()=>alert(msg),100);
  updateScore();
  [...game.children].forEach(c=>c.onclick=null);
}
function updateScore(){
  document.getElementById('score').textContent=`You ${playerWins} : ${aiWins} AI`;
}
document.getElementById('reset').onclick=()=>{
  init();
};
init();
</script>
</body>
</html>
