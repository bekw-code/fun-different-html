<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mobile Quantum Neural Symphony</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
        }
        
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 100;
            color: #00ffff;
            font-size: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #00ffff;
            text-align: center;
        }
        
        .touch-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }
        
        .touch-btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 12px 16px;
            border-radius: 25px;
            font-size: 12px;
            touch-action: manipulation;
            user-select: none;
        }
        
        .touch-btn:active {
            background: rgba(0, 255, 255, 0.5);
            transform: scale(0.95);
        }
        
        .info {
            position: absolute;
            bottom: 80px;
            left: 20px;
            right: 20px;
            color: #ffffff;
            font-size: 9px;
            text-align: center;
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div>Touch and drag to bend spacetime</div>
        <div>Use buttons below to spawn quantum foam</div>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div class="info">
        "Mobile consciousness as crystalline tessellation, each touch a ripple through the quantum foam of possibility..."
    </div>
    
    <div class="touch-controls">
        <button class="touch-btn" id="foamBtn">Quantum Foam</button>
        <button class="touch-btn" id="pulseBtn">Neural Pulse</button>
        <button class="touch-btn" id="resetBtn">Reset Field</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let touchX = width / 2;
        let touchY = height / 2;
        let timeDistortion = 1.0;
        let globalPulse = 0;
        
        // Reduced node count for mobile performance
        const maxNodes = 40;
        const maxConnections = 60;
        
        class MobileQuantumNode {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.originalX = x;
                this.originalY = y;
                this.phase = Math.random() * Math.PI * 2;
                this.frequency = 0.01 + Math.random() * 0.02; // Slower for mobile
                this.amplitude = 15 + Math.random() * 20; // Smaller for mobile
                this.hue = Math.random() * 360;
                this.energy = 0.5 + Math.random() * 0.5;
                this.quantumState = Math.random();
                this.pulseIntensity = 0;
            }
            
            update(time) {
                // Gentler quantum oscillation
                const oscillation = Math.sin(time * this.frequency + this.phase) * this.amplitude;
                this.x = this.originalX + oscillation * Math.cos(this.phase) * 0.5;
                this.y = this.originalY + oscillation * Math.sin(this.phase) * 0.5;
                
                // Touch-based spacetime distortion
                const distanceToTouch = Math.sqrt((this.x - touchX) ** 2 + (this.y - touchY) ** 2);
                const distortionStrength = Math.max(0, 150 - distanceToTouch) / 150;
                
                if (distortionStrength > 0) {
                    const angle = Math.atan2(this.y - touchY, this.x - touchX);
                    const warpFactor = distortionStrength * 30;
                    this.x += Math.cos(angle + Math.PI/2) * warpFactor;
                    this.y += Math.sin(angle + Math.PI/2) * warpFactor;
                }
                
                // Quantum state and color evolution
                this.quantumState += (Math.random() - 0.5) * 0.05;
                this.quantumState = Math.max(0, Math.min(1, this.quantumState));
                this.hue = (this.hue + this.quantumState * 1.5) % 360;
                this.energy = 0.4 + 0.6 * Math.sin(time * 0.008 + this.phase);
                
                // Global pulse effect
                this.pulseIntensity *= 0.95; // Fade pulse
                if (globalPulse > 0) {
                    this.pulseIntensity = Math.max(this.pulseIntensity, globalPulse);
                }
            }
            
            draw(ctx) {
                const alpha = Math.max(0.1, this.energy * this.quantumState);
                const baseSize = Math.max(1, 2 + this.energy * 4);
                const size = baseSize + this.pulseIntensity * 3;
                
                // Softer glow for mobile
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Single prismatic effect (lighter processing)
                if (this.pulseIntensity > 0.1) {
                    const refractedHue = (this.hue + 180) % 360;
                    ctx.fillStyle = `hsla(${refractedHue}, 100%, 80%, ${alpha * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(this.x + 2, this.y + 2, Math.max(0.5, size * 0.8), 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0;
            }
        }
        
        class MobileConnection {
            constructor(nodeA, nodeB) {
                this.nodeA = nodeA;
                this.nodeB = nodeB;
                this.phase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.03 + Math.random() * 0.05;
                this.thickness = 0.5 + Math.random() * 1;
            }
            
            draw(ctx, time) {
                const distance = Math.sqrt((this.nodeA.x - this.nodeB.x) ** 2 + (this.nodeA.y - this.nodeB.y) ** 2);
                if (distance > 120) return; // Shorter connections for mobile
                
                const pulse = Math.sin(time * this.pulseSpeed + this.phase);
                const alpha = Math.max(0, pulse) * 0.3;
                const avgHue = (this.nodeA.hue + this.nodeB.hue) / 2;
                
                ctx.strokeStyle = `hsla(${avgHue}, 100%, 60%, ${alpha})`;
                ctx.lineWidth = this.thickness;
                ctx.shadowBlur = 8;
                ctx.shadowColor = `hsl(${avgHue}, 100%, 50%)`;
                
                ctx.beginPath();
                ctx.moveTo(this.nodeA.x, this.nodeA.y);
                ctx.lineTo(this.nodeB.x, this.nodeB.y); // Straight lines for performance
                ctx.stroke();
                
                ctx.shadowBlur = 0;
            }
        }
        
        class MobileFoam {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 3 + Math.random() * 8;
                this.life = 1.0;
                this.decay = 0.008 + Math.random() * 0.012;
                this.hue = 180 + Math.random() * 180;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.08;
            }
            
            update() {
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                this.size += 0.15;
            }
            
            draw(ctx) {
                if (this.life <= 0) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const alpha = this.life;
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha * 0.6})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                
                // Simple circle for mobile performance
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Initialize with fewer nodes for mobile
        const nodes = [];
        const connections = [];
        const foamBubbles = [];
        
        // Create nodes in a simpler spiral
        const goldenRatio = (1 + Math.sqrt(5)) / 2;
        for (let i = 0; i < maxNodes; i++) {
            const angle = i * 2 * Math.PI / goldenRatio;
            const radius = Math.sqrt(i) * 12;
            const x = width/2 + Math.cos(angle) * radius;
            const y = height/2 + Math.sin(angle) * radius;
            nodes.push(new MobileQuantumNode(x, y));
        }
        
        // Create fewer connections
        for (let i = 0; i < nodes.length && connections.length < maxConnections; i++) {
            for (let j = i + 1; j < nodes.length && connections.length < maxConnections; j++) {
                const distance = Math.sqrt((nodes[i].originalX - nodes[j].originalX) ** 2 + (nodes[i].originalY - nodes[j].originalY) ** 2);
                if (distance < 100 && Math.random() < 0.2) {
                    connections.push(new MobileConnection(nodes[i], nodes[j]));
                }
            }
        }
        
        let time = 0;
        
        function animate() {
            time += 0.08;
            globalPulse *= 0.9; // Fade global pulse
            
            // Lighter fade effect for mobile
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw connections
            connections.forEach(connection => {
                connection.draw(ctx, time);
            });
            
            // Update and draw nodes
            nodes.forEach(node => {
                node.update(time);
                node.draw(ctx);
            });
            
            // Update and draw foam
            for (let i = foamBubbles.length - 1; i >= 0; i--) {
                foamBubbles[i].update();
                foamBubbles[i].draw(ctx);
                
                if (foamBubbles[i].life <= 0) {
                    foamBubbles.splice(i, 1);
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // Touch event handlers
        let isDragging = false;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const touch = e.touches[0];
            touchX = touch.clientX;
            touchY = touch.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const touch = e.touches[0];
                touchX = touch.clientX;
                touchY = touch.clientY;
            }
        });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDragging = false;
        });
        
        // Button controls
        document.getElementById('foamBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < 3; i++) {
                foamBubbles.push(new MobileFoam(
                    touchX + (Math.random() - 0.5) * 60,
                    touchY + (Math.random() - 0.5) * 60
                ));
            }
        });
        
        document.getElementById('pulseBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            globalPulse = 1.0; // Trigger global pulse
        });
        
        document.getElementById('resetBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchX = width / 2;
            touchY = height / 2;
            foamBubbles.length = 0;
            globalPulse = 0;
        });
        
        // Handle orientation changes
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                touchX = width / 2;
                touchY = height / 2;
            }, 100);
        });
        
        // Prevent scrolling and zooming
        document.addEventListener('touchmove', (e) => {
            if (e.target === canvas) {
                e.preventDefault();
            }
        }, { passive: false });
        
        animate();
    </script>
</body>
</html>
