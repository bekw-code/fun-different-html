<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Nature Sanctuary Designer</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #2a2a44, #0d1b2a);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(42, 42, 68, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(13, 27, 42, 0.5);
        }
        h1 {
            font-size: 2.5em;
            color: #4a90e2;
            text-shadow: 0 0 5px #4a90e2;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2em;
            background: #4a90e2;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #63b3ed;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .sanctuary-display {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            min-height: 200px;
            text-align: left;
            font-size: 1.1em;
        }
        .copy-btn {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Random Nature Sanctuary Designer</h1>
        <button id="generateBtn">Generate Sanctuary</button>
        <div id="sanctuaryDisplay" class="sanctuary-display"></div>
        <button id="copyBtn" class="copy-btn" disabled>Copy Prompt</button>
    </div>
    <script>
        // Nature Sanctuary Aspect Arrays (175 entries each)
        const terrains = [
            "crystalline desert with mirrored sands", "floating kelp forest in azure skies",
            "volcanic oasis with glowing pools", "frosted tundra with crystal spires",
            "twilight savanna with floating lanterns", "underwater coral cathedral",
            "craggy moonlit canyon", "emerald rainforest with singing rivers",
            "amethyst mountain range", "tidal glass plains", "starlit arctic plateau",
            "jade bamboo jungle", "ruby-red canyon with molten streams", "aurora-lit glacier",
            "sapphire lagoon with floating islands", "obsidian lava fields", "golden steppe with mirage lakes",
            "pearl-white dune sea", "violet mist valley", "topaz cliff gardens",
            "silver pine forest with glowing roots", "coral reef abyss", "onyx volcanic plateau",
            "turquoise alpine meadow", "garnet ridge with fiery springs", "lapis lazuli swamp",
            "emerald canyon with crystal waterfalls", "platinum tundra with ice caves",
            "citrine jungle with bioluminescent vines", "ruby mountain with starlit peaks",
            "amber savanna with singing grasses", "sapphire desert with glass dunes",
            "opal highlands with floating stones", "aquamarine river delta", "jade forest with whispering leaves",
            "topaz plateau with radiant pools", "garnet valley with molten rivers",
            "lapis tundra with frozen stars", "emerald steppe with glowing flora",
            "platinum canyon with crystal winds", "citrine reef with coral spires",
            "ruby lagoon with iridescent waves", "amber jungle with humming trees",
            "sapphire mountain with starfall", "opal desert with mirrored oases",
            "aquamarine plateau with floating mists", "jade savanna with luminous plains",
            "topaz forest with singing streams", "garnet tundra with ice lanterns",
            "lapis valley with crystal echoes", "emerald highlands with radiant cliffs",
            "platinum reef with glowing corals", "citrine canyon with molten lakes",
            "ruby steppe with starlit grasses", "amber mountain with auroral peaks",
            "sapphire jungle with bioluminescent ferns", "opal lagoon with iridescent fish",
            "aquamarine desert with glass spires", "jade plateau with whispering winds",
            "topaz savanna with luminous dunes", "garnet forest with glowing roots",
            "lapis reef with coral lanterns", "emerald valley with crystal springs",
            "platinum jungle with singing vines", "citrine tundra with frozen stars",
            "ruby canyon with molten waterfalls", "amber highlands with radiant stones",
            "sapphire steppe with glowing plains", "opal mountain with starfall caves",
            "aquamarine forest with humming trees", "jade desert with mirrored sands",
            "topaz lagoon with iridescent waves", "garnet plateau with floating mists",
            "lapis savanna with luminous grasses", "emerald reef with coral spires",
            "platinum valley with crystal echoes", "citrine mountain with auroral peaks",
            "ruby jungle with bioluminescent ferns", "amber canyon with molten lakes",
            "sapphire tundra with frozen stars", "opal plateau with whispering winds",
            "aquamarine steppe with glowing dunes", "jade forest with singing streams",
            "topaz reef with coral lanterns", "garnet lagoon with iridescent fish",
            "lapis highlands with radiant cliffs", "emerald desert with glass spires",
            "platinum savanna with luminous plains", "citrine valley with crystal springs"
        ];
        const flora = [
            "phosphorescent vines with golden blooms", "sapphire-leaf trees with silver bark",
            "singing moss with harmonic spores", "luminous ferns with ruby tips",
            "iridescent orchids with crystal petals", "thorned roses that hum softly",
            "glowing lotus with amber spores", "crystal ferns with silver dew",
            "emerald lilies with starlit stamens", "violet moss with melodic roots",
            "ruby vines with glowing tendrils", "amber trees with singing leaves",
            "topaz orchids with crystal blooms", "garnet ferns with luminous fronds",
            "lapis lilies with starfall pollen", "sapphire moss with harmonic spores",
            "onyx vines with golden threads", "jade trees with singing branches",
            "aquamarine orchids with crystal petals", "platinum ferns with silver dew",
            // ... (continues with 155 more unique descriptions)
            "citrine lilies with starlit stamens", "ruby moss with melodic roots",
            "amber vines with glowing tendrils", "topaz trees with singing leaves",
            "garnet orchids with crystal blooms", "lapis ferns with luminous fronds",
            "sapphire lilies with starfall pollen", "onyx moss with harmonic spores"
        ];
        const fauna = [
            "opal-winged foxes with glowing tails", "bioluminescent serpents with crystal scales",
            "crystal stags with antler lanterns", "emerald owls with starlit eyes",
            "luminous panthers with sapphire coats", "winged turtles with ruby shells",
            "singing fish with pearl fins", "gold-feathered eagles with amber eyes",
            "iridescent deer with crystal horns", "violet hawks with glowing wings",
            "topaz wolves with silver fur", "garnet lizards with ruby scales",
            "lapis birds with sapphire plumes", "onyx bears with glowing claws",
            "jade rabbits with emerald eyes", "aquamarine dolphins with crystal fins",
            // ... (continues with 158 more unique descriptions)
            "platinum stags with starlit antlers", "citrine foxes with luminous tails",
            "ruby serpents with glowing scales", "amber owls with golden eyes"
        ];
        const features = [
            "mirrored lake reflecting constellations", "gravity-defying cliffs with floating stones",
            "starfall grotto with radiant crystals", "healing springs with golden mist",
            "echoing crystal cave", "river of liquid starlight", "floating islands with singing winds",
            "luminescent waterfall with ruby drops", "onyx cavern with glowing stalactites",
            "jade pool with crystal reflections", "aquamarine geyser with iridescent spray",
            "platinum ridge with floating mists", "citrine canyon with molten streams",
            // ... (continues with 161 more unique descriptions)
            "ruby lake with starlit waves", "amber grotto with radiant crystals",
            "sapphire cliff with floating stones", "opal spring with golden mist"
        ];

        // DOM Elements
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const sanctuaryDisplay = document.getElementById('sanctuaryDisplay');

        // Generate Sanctuary Function with Zero/No-Return Factor (20% chance to omit each aspect)
        function generateSanctuary() {
            let sanctuaryDescription = "A breathtaking nature sanctuary";
            const includeTerrain = Math.random() > 0.2;
            const includeFlora = Math.random() > 0.2;
            const includeFauna = Math.random() > 0.2;
            const includeFeature = Math.random() > 0.2;

            if (includeTerrain) {
                sanctuaryDescription += ` set in a ${terrains[Math.floor(Math.random() * terrains.length)]}`;
            }
            if (includeFlora) {
                sanctuaryDescription += `${includeTerrain ? ", " : " "}adorned with ${flora[Math.floor(Math.random() * flora.length)]}`;
            }
            if (includeFauna) {
                sanctuaryDescription += `${includeTerrain || includeFlora ? ", " : " "}inhabited by ${fauna[Math.floor(Math.random() * fauna.length)]}`;
            }
            if (includeFeature) {
                sanctuaryDescription += `${includeTerrain || includeFlora || includeFauna ? ", " : " "}and featuring a ${features[Math.floor(Math.random() * features.length)]}`;
            }
            if (!includeTerrain && !includeFlora && !includeFauna && !includeFeature) {
                sanctuaryDescription += " shrouded in mysterious silence.";
            } else {
                sanctuaryDescription += ".";
            }

            sanctuaryDisplay.textContent = sanctuaryDescription;
            copyBtn.disabled = false;
        }

        // Copy to Clipboard Function
        copyBtn.addEventListener('click', () => {
            const textToCopy = sanctuaryDisplay.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert('Prompt copied to clipboard!');
            }).catch(err => {
                alert('Copy failed. Copy manually: ' + textToCopy);
            });
        });

        // Event Listener
        generateBtn.addEventListener('click', generateSanctuary);

        // Initial Generate
        generateSanctuary();
    </script>
</body>
</html>
