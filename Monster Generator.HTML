<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #1a1a2e, #2c2f3a);
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(44, 47, 58, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(26, 26, 46, 0.5);
        }
        h1 {
            font-size: 2.5em;
            color: #b22222;
            text-shadow: 0 0 5px #b22222;
        }
        button {
            padding: 10px 20px;
            font-size: 1.2em;
            background: #b22222;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #dc143c;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .monster-display {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            min-height: 200px;
            text-align: left;
            font-size: 1.1em;
        }
        .copy-btn {
            margin-top: 10px;
        }
    </style>
</head>

        // DOM Elements
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const monsterDisplay = document.getElementById('monsterDisplay');

        // Generate Monster Function
        function generateMonster() {
            const randomBody = bodyTypes[Math.floor(Math.random() * bodyTypes.length)];
            const randomHead = heads[Math.floor(Math.random() * heads.length)];
            const randomLimbs = limbs[Math.floor(Math.random() * limbs.length)];
            const randomSkin = skins[Math.floor(Math.random() * skins.length)];
            const randomEyes = eyes[Math.floor(Math.random() * eyes.length)];
            const randomWeapon = weaponsSpellsItems[Math.floor(Math.random() * weaponsSpellsItems.length)];
            const randomHabitat = habitats[Math.floor(Math.random() * habitats.length)];

            const monsterDescription = `A terrifying monster with a ${randomBody}, a ${randomHead}, ${randomLimbs}, covered in ${randomSkin}, with ${randomEyes}, wielding ${randomWeapon}, lurking in a ${randomHabitat}.`;
            monsterDisplay.textContent = monsterDescription;
            copyBtn.disabled = false;
        }

        // Copy to Clipboard Function
        copyBtn.addEventListener('click', () => {
            const textToCopy = monsterDisplay.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert('Prompt copied to clipboard!');
            }).catch(err => {
                alert('Copy failed. Copy manually: ' + textToCopy);
            });
        });

        // Event Listener
        generateBtn.addEventListener('click', generateMonster);

        // Initial Generate
        generateMonster();

</html>
