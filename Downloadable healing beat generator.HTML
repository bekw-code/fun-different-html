<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healing Bass Beat Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #00ffaa; font-family: 'Courier New', monospace; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.title { font-size: 3em; margin-bottom: 20px; color: #44ffcc; text-shadow: 0 0 20px #00ffaa; text-align: center; }
.controls { display: flex; flex-wrap: wrap; gap: 20px; margin: 30px 0; justify-content: center; align-items: center; }
.control-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.btn { background: #001122; border: 3px solid #00ffaa; color: #00ffaa; padding: 15px 30px; font-size: 1.2em; font-weight: bold; cursor: pointer; border-radius: 8px; transition: all 0.3s ease; }
.btn:hover { background: #002244; box-shadow: 0 0 20px #00ffaa; transform: scale(1.05); }
.btn.active { background: #003355; box-shadow: 0 0 25px #00ffaa; }
.slider { width: 200px; height: 8px; background: #003344; border-radius: 4px; outline: none; cursor: pointer; -webkit-appearance: none; }
.slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #00ffaa; border-radius: 50%; }
.slider::-moz-range-thumb { width: 20px; height: 20px; background: #00ffaa; border-radius: 50%; border: none; }
.label { font-size: 1.1em; color: #88ffcc; text-align: center; }
.value { font-size: 1.3em; color: #44ffcc; font-weight: bold; }
.status { margin: 20px 0; padding: 15px; background: #001122; border: 2px solid #00ffaa; border-radius: 8px; text-align: center; font-size: 1.1em; }
</style>
</head>
<body>
<div class="title">🌊 HEALING BASS GENERATOR 🌊</div>
<div class="status" id="status">Click GENERATE to create your unique healing bass beat!</div>
<div class="controls">
<button class="btn" id="generateBtn">🎲 GENERATE NEW BEAT</button>
<button class="btn" id="stopBtn">⏹️ STOP</button>
<button class="btn" id="downloadBtn">💾 DOWNLOAD 1 MIN</button>
<div class="control-group">
<div class="label">MASTER VOLUME</div>
<input type="range" class="slider" id="volumeSlider" min="0" max="150" value="100">
<div class="value" id="volumeValue">100%</div>
</div>
<div class="control-group">
<div class="label">TEMPO</div>
<input type="range" class="slider" id="tempoSlider" min="60" max="180" value="120">
<div class="value" id="tempoValue">120 BPM</div>
</div>
</div>
<script>
var audioCtx, currentBeat = null, isPlaying = false, masterVolume = 1.0, currentTempo = 120;
var recorder, recordedChunks = [], recordingDestination;

// Healing frequencies for bass generation
var healingFreqs = [
  40,    // Gamma brainwave
  60,    // Deep meditation
  72,    // Heart coherence
  80,    // Earth resonance
  90,    // Grounding frequency  
  108,   // Sacred frequency
  110,   // Cell regeneration
  136.1, // Om frequency
  174,   // Pain relief
  194.18 // Root chakra
];

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function updateStatus(message) {
  document.getElementById('status').textContent = message;
}

function createHealingBass(frequency, volume, duration) {
  if (!audioCtx) return null;
  
  var oscillators = [];
  var gains = [];
  
  // Main bass oscillator
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  var filter = audioCtx.createBiquadFilter();
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(frequency * 0.8, audioCtx.currentTime + 0.1);
  
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(800, audioCtx.currentTime);
  
  gain.gain.setValueAtTime(volume * masterVolume * 1.5, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  
  osc.connect(filter);
  filter.connect(gain);
  
  if (recordingDestination) {
    gain.connect(recordingDestination);
  }
  gain.connect(audioCtx.destination);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
  
  oscillators.push(osc);
  gains.push(gain);
  
  // Sub-bass layer
  var subOsc = audioCtx.createOscillator();
  var subGain = audioCtx.createGain();
  
  subOsc.type = 'triangle';
  subOsc.frequency.setValueAtTime(frequency * 0.5, audioCtx.currentTime);
  
  subGain.gain.setValueAtTime(volume * 0.8 * masterVolume, audioCtx.currentTime);
  subGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration * 0.8);
  
  subOsc.connect(subGain);
  
  if (recordingDestination) {
    subGain.connect(recordingDestination);
  }
  subGain.connect(audioCtx.destination);
  
  subOsc.start(audioCtx.currentTime);
  subOsc.stop(audioCtx.currentTime + duration * 0.8);
  
  oscillators.push(subOsc);
  gains.push(subGain);
  
  return { oscillators: oscillators, gains: gains };
}

function createHealingKick(volume) {
  if (!audioCtx) return null;
  
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  
  // Use healing frequency for kick
  var kickFreq = healingFreqs[Math.floor(Math.random() * 5)]; // First 5 are good for kicks
  
  osc.type = 'sine';
  osc.frequency.setValueAtTime(kickFreq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(kickFreq * 0.6, audioCtx.currentTime + 0.1);
  
  gain.gain.setValueAtTime(volume * masterVolume * 1.8, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  
  osc.connect(gain);
  
  if (recordingDestination) {
    gain.connect(recordingDestination);
  }
  gain.connect(audioCtx.destination);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.4);
  
  return { oscillators: [osc], gains: [gain] };
}

function generateRandomBeat() {
  initAudio();
  
  var steps = 8 + (Math.floor(Math.random() * 3) * 8); // 8, 16, or 24 steps
  var instruments = [];
  
  // Always include at least one kick and one bass
  instruments.push({
    type: 'kick',
    steps: generateRandomSteps(steps, 2, 4)
  });
  
  instruments.push({
    type: 'bass1',
    freq: healingFreqs[Math.floor(Math.random() * healingFreqs.length)],
    steps: generateRandomSteps(steps, 1, 3)
  });
  
  // Randomly add more instruments
  if (Math.random() > 0.4) {
    instruments.push({
      type: 'bass2',
      freq: healingFreqs[Math.floor(Math.random() * healingFreqs.length)],
      steps: generateRandomSteps(steps, 1, 2)
    });
  }
  
  if (Math.random() > 0.6) {
    instruments.push({
      type: 'subbass',
      freq: healingFreqs[Math.floor(Math.random() * 5)], // Lower healing freqs
      steps: generateRandomSteps(steps, 1, 2)
    });
  }
  
  var beat = {
    steps: steps,
    instruments: instruments,
    currentStep: 0
  };
  
  updateStatus(`Generated healing beat: ${instruments.length} instruments, ${steps} steps`);
  return beat;
}

function generateRandomSteps(totalSteps, minSteps, maxSteps) {
  var steps = [];
  var numSteps = minSteps + Math.floor(Math.random() * (maxSteps - minSteps + 1));
  
  for (var i = 0; i < numSteps; i++) {
    var step;
    do {
      step = Math.floor(Math.random() * totalSteps);
    } while (steps.includes(step));
    steps.push(step);
  }
  
  return steps.sort((a, b) => a - b);
}

function playBeat(beat) {
  beat.instruments.forEach(function(instrument) {
    if (instrument.steps.includes(beat.currentStep)) {
      switch (instrument.type) {
        case 'kick':
          createHealingKick(0.8 + Math.random() * 0.4);
          break;
        case 'bass1':
          createHealingBass(instrument.freq, 0.6 + Math.random() * 0.4, 0.4 + Math.random() * 0.3);
          break;
        case 'bass2':
          createHealingBass(instrument.freq, 0.4 + Math.random() * 0.3, 0.3 + Math.random() * 0.2);
          break;
        case 'subbass':
          createHealingBass(instrument.freq * 0.5, 0.8 + Math.random() * 0.4, 0.6 + Math.random() * 0.4);
          break;
      }
    }
  });
  
  beat.currentStep = (beat.currentStep + 1) % beat.steps;
}

function startRecording() {
  if (!audioCtx) return;
  
  recordedChunks = [];
  recordingDestination = audioCtx.createMediaStreamDestination();
  
  try {
    recorder = new MediaRecorder(recordingDestination.stream);
    recorder.ondataavailable = function(event) {
      if (event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    };
    recorder.start();
    updateStatus('Recording 60 seconds of healing bass...');
  } catch (e) {
    updateStatus('Recording not supported in this browser');
    recordingDestination = null;
  }
}

function stopRecording() {
  if (recorder && recorder.state === 'recording') {
    recorder.stop();
  }
}

function downloadRecording() {
  if (recordedChunks.length > 0) {
    var blob = new Blob(recordedChunks, { type: 'audio/wav' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = `healing-bass-beat-${Date.now()}.wav`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    updateStatus('Healing bass beat downloaded! 🎵');
  } else {
    updateStatus('No recording available');
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('generateBtn').addEventListener('click', function() {
    if (currentBeat) {
      clearInterval(currentBeat.interval);
      isPlaying = false;
    }
    
    currentBeat = generateRandomBeat();
    isPlaying = true;
    
    this.classList.add('active');
    document.getElementById('stopBtn').classList.remove('active');
    
    var stepDuration = (60 / currentTempo) * 1000 / 4;
    currentBeat.interval = setInterval(() => {
      if (isPlaying) {
        playBeat(currentBeat);
      }
    }, stepDuration);
  });
  
  document.getElementById('stopBtn').addEventListener('click', function() {
    if (currentBeat) {
      clearInterval(currentBeat.interval);
      isPlaying = false;
    }
    
    this.classList.add('active');
    document.getElementById('generateBtn').classList.remove('active');
    updateStatus('Healing beat stopped');
  });
  
  document.getElementById('downloadBtn').addEventListener('click', function() {
    if (currentBeat && isPlaying) {
      startRecording();
      
      setTimeout(() => {
        stopRecording();
        setTimeout(downloadRecording, 500);
      }, 60000);
    } else {
      updateStatus('Start a healing beat first to download!');
    }
  });
  
  document.getElementById('volumeSlider').addEventListener('input', function(e) {
    var volume = parseInt(e.target.value);
    masterVolume = volume / 100;
    document.getElementById('volumeValue').textContent = volume + '%';
  });
  
  document.getElementById('tempoSlider').addEventListener('input', function(e) {
    currentTempo = parseInt(e.target.value);
    document.getElementById('tempoValue').textContent = currentTempo + ' BPM';
    
    if (currentBeat && isPlaying) {
      clearInterval(currentBeat.interval);
      var stepDuration = (60 / currentTempo) * 1000 / 4;
      currentBeat.interval = setInterval(() => {
        if (isPlaying) {
          playBeat(currentBeat);
        }
      }, stepDuration);
    }
  });
  
  updateStatus('Healing Bass Generator ready! 🌊');
});
</script>
</body>
</html>
