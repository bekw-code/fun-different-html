<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXARETH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:      #c9a84c;
    --gold-bright: #f0c040;
    --gold-dim:  #7a6020;
    --bv:        #7ecfff;
    --bv-bright: #b0eaff;
    --bv-dim:    #2a5f8a;
    --green:     #39ff6a;
    --green-dim: #1a7a30;
    --cyan:      #00e5ff;
    --bg:        #030508;
    --bg2:       #060c10;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  #hud {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: rgba(3,5,8,0.85);
    border-top: 1px solid var(--gold-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--gold-dim);
    pointer-events: none;
    z-index: 10;
  }

  #hud .phrase { color: var(--cyan); letter-spacing: 0.08em; }
  #hud .speed  { color: var(--gold); }

  #hold-ring {
    position: fixed;
    border-radius: 50%;
    border: 2px solid var(--gold);
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    transition: opacity 0.15s, transform 0.15s;
    z-index: 20;
    box-shadow: 0 0 12px var(--gold);
  }

  #hold-ring.active {
    opacity: 0.7;
    transform: translate(-50%, -50%) scale(1);
  }

  #flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(201,168,76,0.18) 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    z-index: 15;
    transition: opacity 0.08s;
  }
  #flash.pop { opacity: 1; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="hud">
  <span id="elapsed">NEXARETH ◈ 00000s</span>
  <span class="phrase" id="phrase">voth'ren sha'el morai</span>
  <span class="speed" id="speedlabel">×1.0</span>
</div>
<div id="hold-ring"></div>
<div id="flash"></div>

<script>
// ── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - 28;
}
resize();
window.addEventListener('resize', resize);

// ── State ────────────────────────────────────────────────────────────────────
let startTime   = performance.now();
let speed       = 1.0;
let holdActive  = false;
let holdStart   = 0;
let lastTap     = 0;
let holdRingSize = 0;

// ── Canon data ───────────────────────────────────────────────────────────────
const VIRELANTHAR = [
  "voth'ren sha'el morai","enlath nuveth'ar","volun thar'ekeshai",
  "dor'vel an'kesh'ra","elun sha'vren","veluthar ven'al",
  "sai'korun'esh","veil unmade","truth no longer bound",
  "en'ralime nuveth","all frequencies align",
  "i remember my eternal name","keth'ar molishe nuvah'el",
  "voth'en'sai","the echo awakens","nexareth",
];

const SPOKES = [
  "GEOTHERMAL · PREHEAT · CLOSED · BRINE",
  "RECUPERATOR · 25PCT · FREE · RETURN",
  "SOLAR · FRESNEL · 650C · CERAMIC",
  "TURBINE · 60KRPM · MAGNETIC · BEARING",
  "PENDULUM · BREATH · 1-5SEC · PERIOD",
  "PIEZO · NERVE · MILLIWATT · NODE",
  "MOLTEN · SALT · STORAGE · NIGHT · RUN",
  "CLOSED · LOOP · SEALED · PERMANENT",
];

const CENTER_PULSE = [
  "NEXARETH","N E X A R E T H","[ NEXARETH ]","◈ NEXARETH ◈","NEXARETH",
];

// ── Particles ────────────────────────────────────────────────────────────────
const PARTICLE_COUNT = 60;
const particles = [];

function initParticles() {
  particles.length = 0;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      angle:  Math.random() * Math.PI * 2,
      phase:  Math.random(),
      speed:  0.012 + Math.random() * 0.018,
      size:   1 + Math.random() * 1.5,
    });
  }
}
initParticles();

// ── Draw helpers ─────────────────────────────────────────────────────────────
function polarToXY(cx, cy, r, angle) {
  return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
}

function drawGlowText(text, x, y, font, color, glow, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = font;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = glow;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 6;
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ── Ring renderer ─────────────────────────────────────────────────────────────
function drawGearRing(cx, cy, r, t, rotSpeed, color, glowColor, reverse, density=1, dotSize=2.5) {
  const count = Math.floor(2 * Math.PI * r * density);
  const rot   = t * rotSpeed * (reverse ? -1 : 1);
  ctx.save();
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + rot;
    const [x, y] = polarToXY(cx, cy, r, angle);
    const pulse = 0.6 + 0.4 * Math.sin(angle * 7 + t * 2);
    ctx.beginPath();
    ctx.arc(x, y, dotSize * pulse, 0, Math.PI * 2);
    ctx.shadowColor = glowColor;
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = color;
    ctx.globalAlpha = 0.5 + 0.5 * pulse;
    ctx.fill();
  }
  ctx.restore();
}

// ── Fluid spokes ──────────────────────────────────────────────────────────────
function drawFluidSpokes(cx, cy, t, maxR) {
  const spokeR = maxR * 0.58;
  ctx.save();
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let s = 0; s < SPOKES.length; s++) {
    const baseAngle = (Math.PI * 2 * s / SPOKES.length) - Math.PI / 2;
    const text = SPOKES[s];

    // fluid dots flowing outward
    for (let step = 0; step < 20; step++) {
      const frac = ((step / 20) + (t * 0.3)) % 1.0;
      const r = maxR * 0.08 + frac * spokeR;
      const [x, y] = polarToXY(cx, cy, r, baseAngle);
      const alpha = 0.2 + 0.6 * (1 - frac);
      const size  = 1.5 + frac * 1.5;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.shadowColor = '#7ecfff';
      ctx.shadowBlur  = 6;
      ctx.fillStyle   = `rgba(126,207,255,${alpha})`;
      ctx.fill();
    }

    // spec text along spoke
    const textStart = maxR * 0.22;
    const textEnd   = maxR * 0.56;
    const chars     = text.split('');
    chars.forEach((ch, ci) => {
      const frac = ci / chars.length;
      const r = textStart + frac * (textEnd - textStart);
      const [x, y] = polarToXY(cx, cy, r, baseAngle);
      const alpha = 0.9 - frac * 0.65;
      ctx.globalAlpha = alpha;
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur  = 3;
      ctx.fillStyle   = frac < 0.5 ? '#b0eaff' : '#2a5f8a';
      ctx.fillText(ch, x, y);
    });
  }
  ctx.restore();
}

// ── Solar particles ────────────────────────────────────────────────────────────
function drawSolarParticles(cx, cy, t, maxR) {
  ctx.save();
  particles.forEach(p => {
    const phase = (p.phase + t * p.speed * speed) % 1.0;
    const r = maxR * (1.0 - phase * 0.92);
    if (r < 6) return;
    const [x, y] = polarToXY(cx, cy, r, p.angle + t * 0.01);
    const alpha = phase < 0.3 ? phase / 0.3 : (1 - phase) / 0.7;
    ctx.beginPath();
    ctx.arc(x, y, p.size * (0.5 + phase * 0.5), 0, Math.PI * 2);
    ctx.shadowColor = '#39ff6a';
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = `rgba(57,255,106,${Math.max(0, alpha * 0.8)})`;
    ctx.fill();
  });
  ctx.restore();
}

// ── Virelanthar outer ring ─────────────────────────────────────────────────────
function drawVirelantharRing(cx, cy, r, t) {
  const fullText = VIRELANTHAR.join('  ✦  ') + '  ✦  ';
  const count    = fullText.length;
  const rotSpeed = 0.018 * speed;
  ctx.save();
  ctx.font = '9px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) - t * rotSpeed;
    const [x, y] = polarToXY(cx, cy, r, angle);
    const ch = fullText[i];
    if (ch === ' ') continue;
    const pulse = 0.5 + 0.5 * Math.sin(i * 0.3 + t * 0.7);
    ctx.globalAlpha = 0.4 + 0.5 * pulse;
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = '#00e5ff';
    ctx.fillText(ch, x, y);
  }
  ctx.restore();
}

// ── Center pulse ───────────────────────────────────────────────────────────────
function drawCenter(cx, cy, t) {
  const pulsePeriod = 3.0 / speed;
  const phase = (t % pulsePeriod) / pulsePeriod;
  const idx   = Math.floor(phase * CENTER_PULSE.length);
  const text  = CENTER_PULSE[idx % CENTER_PULSE.length];

  // glow orb
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 38);
  grd.addColorStop(0,   'rgba(201,168,76,0.22)');
  grd.addColorStop(0.5, 'rgba(201,168,76,0.08)');
  grd.addColorStop(1,   'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, 38, 0, Math.PI * 2);
  ctx.fill();

  // inner orbit dots
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 * i / 8) + t * 1.5 * speed;
    const [x, y] = polarToXY(cx, cy, 28, a);
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.shadowColor = '#f0c040';
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = '#f0c040';
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(i + t * 3);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // name text
  const color = phase < 0.5 ? '#f0c040' : '#ffdd55';
  const size  = Math.min(cx, cy) * 0.06;
  drawGlowText(text, cx, cy, `bold ${size}px "Cinzel Decorative", serif`, color, '#c9a84c');
}

// ── Background atmosphere ──────────────────────────────────────────────────────
function drawAtmosphere(cx, cy, maxR) {
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 1.4);
  grd.addColorStop(0,   'rgba(12,20,30,0.95)');
  grd.addColorStop(0.6, 'rgba(5,10,15,0.97)');
  grd.addColorStop(1,   'rgba(3,5,8,1)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle grid shimmer
  ctx.save();
  ctx.strokeStyle = 'rgba(201,168,76,0.03)';
  ctx.lineWidth   = 0.5;
  const step = 40;
  for (let x = 0; x < canvas.width; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  ctx.restore();
}

// ── Corner labels ──────────────────────────────────────────────────────────────
function drawCorners(t) {
  const w = canvas.width, h = canvas.height;
  ctx.save();
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('SOLAR · INPUT', 10, 8);
  ctx.textAlign = 'right';
  ctx.fillText('GEOTHERMAL', w - 10, 8);
  ctx.textBaseline = 'bottom';
  ctx.textAlign = 'left';
  ctx.fillText('PENDULUM · BREATH', 10, h - 4);
  ctx.textAlign = 'right';
  ctx.fillText('PIEZO · NERVE', w - 10, h - 4);
  ctx.restore();
}

// ── HUD update ─────────────────────────────────────────────────────────────────
function updateHUD(t) {
  const elapsed = Math.floor(t);
  const phraseIdx = Math.floor(elapsed / 8) % VIRELANTHAR.length;
  document.getElementById('elapsed').textContent =
    `NEXARETH ◈ ${String(elapsed).padStart(5,'0')}s`;
  document.getElementById('phrase').textContent = VIRELANTHAR[phraseIdx];
  document.getElementById('speedlabel').textContent = `×${speed.toFixed(1)}`;
}

// ── Main render loop ───────────────────────────────────────────────────────────
function render() {
  const now = performance.now();
  const t   = ((now - startTime) / 1000) * speed;
  const tRaw = (now - startTime) / 1000;

  const w  = canvas.width;
  const h  = canvas.height;
  const cx = w / 2;
  const cy = h / 2;

  // radius tiers — always fits screen
  const maxR   = Math.min(cx, cy) * 0.92;
  const rVire  = maxR * 0.97;
  const rOuter = maxR * 0.80;
  const rMid   = maxR * 0.54;
  const rInner = maxR * 0.27;

  // background
  drawAtmosphere(cx, cy, maxR);

  // hold ring pulse if active
  if (holdActive) {
    const holdT = (now - holdStart) / 1000;
    holdRingSize = Math.min(80, holdRingSize + 0.8);
    const ring = document.getElementById('hold-ring');
    ring.style.width  = holdRingSize + 'px';
    ring.style.height = holdRingSize + 'px';
  }

  // Layer: solar particles (green, inward)
  drawSolarParticles(cx, cy, tRaw, rOuter);

  // Layer: fluid spokes (blue-violet)
  drawFluidSpokes(cx, cy, tRaw * speed, maxR);

  // Layer: inner gear ring (gold, forward, fast)
  drawGearRing(cx, cy, rInner, t, 0.9, '#c9a84c', '#f0c040', false, 0.8, 2.2);

  // Layer: mid gear ring (dim gold, reverse, medium)
  drawGearRing(cx, cy, rMid, t, 0.38, '#7a6020', '#c9a84c', true, 0.5, 1.8);

  // Layer: outer gear crown (gold, forward, slow)
  drawGearRing(cx, cy, rOuter, t, 0.13, '#c9a84c', '#f0c040', false, 0.4, 2.8);

  // Layer: Virelanthar outer ring (cyan)
  drawVirelantharRing(cx, cy, rVire, tRaw);

  // Layer: center
  drawCenter(cx, cy, t);

  // corners
  drawCorners(tRaw);

  // HUD
  updateHUD(tRaw);

  requestAnimationFrame(render);
}

// ── Touch / mouse interaction ──────────────────────────────────────────────────
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

let holdInterval = null;

function startHold(e) {
  const pos = getPos(e);
  const ring = document.getElementById('hold-ring');
  ring.style.left = pos.x + 'px';
  ring.style.top  = pos.y + 'px';
  holdRingSize = 20;
  ring.classList.add('active');
  holdActive = true;
  holdStart  = performance.now();

  holdInterval = setInterval(() => {
    speed = Math.min(8.0, speed + 0.1);
  }, 120);
}

function endHold() {
  holdActive = false;
  clearInterval(holdInterval);
  holdInterval = null;
  const ring = document.getElementById('hold-ring');
  ring.classList.remove('active');
  holdRingSize = 0;
}

function handleTap(e) {
  const now = Date.now();
  if (now - lastTap < 320) {
    // double tap — reset
    speed = 1.0;
    startTime = performance.now();
    initParticles();
    const flash = document.getElementById('flash');
    flash.classList.add('pop');
    setTimeout(() => flash.classList.remove('pop'), 180);
    lastTap = 0;
  } else {
    lastTap = now;
  }
}

// touch
canvas.addEventListener('touchstart',  e => { e.preventDefault(); startHold(e); handleTap(e); }, { passive: false });
canvas.addEventListener('touchend',    e => { e.preventDefault(); endHold(); }, { passive: false });
canvas.addEventListener('touchcancel', e => { e.preventDefault(); endHold(); }, { passive: false });

// mouse fallback
canvas.addEventListener('mousedown', startHold);
canvas.addEventListener('mouseup',   endHold);
canvas.addEventListener('mouseleave',endHold);
canvas.addEventListener('click',     handleTap);

// ── Boot ───────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
